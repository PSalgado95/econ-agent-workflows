interface:
  display_name: "Econ LFG"
  short_description: "Run autonomous econ plan-work-review-revision loop"
  default_prompt: "Use $econ-lfg to run this bounded empirical or hybrid economics task end to end under a goal-backed contract. Save an econ-plan first, execute through econ-work, review with econ-review, fix straightforward or agent-owned findings, write an economist-facing decision memo for researcher-level choices, run targeted re-review, and deliver only when residuals are resolved, consciously deferred, or genuinely blocked."
